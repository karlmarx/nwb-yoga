<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Subtle glow at petal convergence -->
    <radialGradient id="glow" cx="256" cy="290" r="130" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EFF5F0"/>
      <stop offset="40%" stop-color="#E8F0EA" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#F5F0EB" stop-opacity="0"/>
    </radialGradient>

    <!-- Outer petal — darkest green -->
    <linearGradient id="petal-outer" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#1A3A28"/>
      <stop offset="60%" stop-color="#245038"/>
      <stop offset="100%" stop-color="#2E6248"/>
    </linearGradient>

    <!-- Mid petal — medium green -->
    <linearGradient id="petal-mid" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#245038"/>
      <stop offset="60%" stop-color="#306848"/>
      <stop offset="100%" stop-color="#3C7E58"/>
    </linearGradient>

    <!-- Inner petals — lighter green -->
    <linearGradient id="petal-inner" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#306848"/>
      <stop offset="60%" stop-color="#408860"/>
      <stop offset="100%" stop-color="#50A078"/>
    </linearGradient>

    <!-- Center petal — lightest sage -->
    <linearGradient id="petal-center" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#3C7E58"/>
      <stop offset="60%" stop-color="#509870"/>
      <stop offset="100%" stop-color="#68B088"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#F5F0EB"/>

  <!-- Glow behind the lotus -->
  <ellipse cx="256" cy="275" rx="110" ry="90" fill="url(#glow)"/>

  <g transform="translate(256,340)">
    <!-- Outer petals -->
    <path d="M0,0 C-18,-30 -22,-85 0,-130 C22,-85 18,-30 0,0Z"
          transform="rotate(62) scale(1.1,1.0)" fill="url(#petal-outer)"/>
    <path d="M0,0 C-18,-30 -22,-85 0,-130 C22,-85 18,-30 0,0Z"
          transform="rotate(-62) scale(1.1,1.0)" fill="url(#petal-outer)"/>

    <!-- Mid-outer petals -->
    <path d="M0,0 C-16,-38 -20,-100 0,-155 C20,-100 16,-38 0,0Z"
          transform="rotate(38)" fill="url(#petal-mid)"/>
    <path d="M0,0 C-16,-38 -20,-100 0,-155 C20,-100 16,-38 0,0Z"
          transform="rotate(-38)" fill="url(#petal-mid)"/>

    <!-- Inner petals -->
    <path d="M0,0 C-14,-44 -18,-115 0,-180 C18,-115 14,-44 0,0Z"
          transform="rotate(18)" fill="url(#petal-inner)"/>
    <path d="M0,0 C-14,-44 -18,-115 0,-180 C18,-115 14,-44 0,0Z"
          transform="rotate(-18)" fill="url(#petal-inner)"/>

    <!-- Center petal -->
    <path d="M0,0 C-14,-54 -16,-130 0,-210 C16,-130 14,-54 0,0Z"
          fill="url(#petal-center)"/>

    <!-- Inner highlight on center petal -->
    <path d="M0,-20 C-7,-55 -8,-115 0,-185 C8,-115 7,-55 0,-20Z"
          fill="#F5F0EB" opacity="0.18"/>

    <!-- Stamen -->
    <circle cx="0" cy="-8" r="10" fill="#1A3A28"/>
    <circle cx="0" cy="-8" r="4.5" fill="#50A078" opacity="0.5"/>
  </g>
</svg>
